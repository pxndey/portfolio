services:
  frontend:
    build: ./frontend
    container_name: portfolio-frontend
    restart: unless-stopped
    networks:
      - portfolio
      - proxy
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8080
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.portfolio.rule=Host(`pxndey.com`)"
      - "traefik.http.routers.portfolio.entrypoints=web"
      - "traefik.http.services.portfolio.loadbalancer.server.port=3000"
      - "traefik.docker.network=proxy"
  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: unless-stopped
    networks:
      - portfolio
    environment:
      - PORT=8080
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_USERNAME=${LASTFM_USERNAME}
      - LOG_PATH=/app/logs/visitors.log
    volumes:
      - ./audio:/app/audio:ro
      - ./logs:/app/logs

networks:
  portfolio:
    driver: bridge
  proxy:
    external: true

