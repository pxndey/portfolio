services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    networks:
      - portfolio
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:8080
    ports:
      - "3000:3000"

  backend:
    build: ./backend
    restart: unless-stopped
    networks:
      - portfolio
    environment:
      - PORT=8080
      - LASTFM_API_KEY=${LASTFM_API_KEY}
      - LASTFM_USERNAME=${LASTFM_USERNAME}
    volumes:
      - ./audio:/app/audio:ro
    ports:
      - "8080:8080"

networks:
  portfolio:
    driver: bridge

